<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" fill="none">
  <!-- deqo — pure white for high visibility -->
  <text
    x="0" y="195"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="220"
    font-weight="200"
    letter-spacing="-10"
    fill="#FFFFFF"
  >deqo</text>

  <!-- "in" red block — aligned to the baseline -->
  <rect x="540" y="0" width="220" height="240" fill="#BF1F5A" rx="0"/>

  <!-- in — dark grey text for professional contrast -->
  <text
    x="555" y="195"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="220"
    font-weight="400"
    letter-spacing="-10"
    fill="#1A1A1A"
  >in</text>
</svg>
